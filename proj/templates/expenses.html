{% extends 'base.html' %}

{% block content %}
<h1>Expenses</h1>

<form action="{{ url_for('expenses') }}" method="post" class="mb-4">
    <div class="row g-3">
        <div class="col-md-3">
            <input type="date" name="date" class="form-control" required>
        </div>
        <div class="col-md-2">
            <select name="category" class="form-select" required>
                <option value="">Category</option>
                <option value="Food">Food</option>
                <option value="Transportation">Transportation</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Utilities">Utilities</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="col-md-2">
            <input type="number" name="amount" class="form-control" placeholder="Amount" step="0.01" required>
        </div>
        <div class="col-md-3">
            <input type="text" name="description" class="form-control" placeholder="Description">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Add Expense</button>
        </div>
    </div>
</form>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Description</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for expense in expenses %}
        <tr>
            <td>{{ expense['date'] }}</td>
            <td>{{ expense['category'] }}</td>
            <td>${{ "%.2f"|format(expense['amount']) }}</td>
            <td>{{ expense['description'] }}</td>
            <td>
                <a href="{{ url_for('delete', id=expense['id']) }}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this expense?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
