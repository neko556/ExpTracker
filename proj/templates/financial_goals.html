<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Goals - Expense Tracker</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f0f3f5;
        }
        .goals-container {
            max-width: 600px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 8px;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        footer {
            background-color: #343a40;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Financial Goals Form -->
    <div class="container goals-container">
        <h2 class="text-center mb-4">Set Your Financial Goals</h2>
        <form action="login.html" method="GET"> <!-- Redirect to Login -->
            <div class="form-group">
                <label for="income">Monthly Income</label>
                <input type="number" class="form-control" id="income" name="income" placeholder="Enter your monthly income" required>
            </div>
            <div class="form-group">
                <label for="goal">Monthly Saving Goal</label>
                <input type="number" class="form-control" id="goal" name="goal" placeholder="How much do you aim to save each month?" required>
            </div>
            <div class="form-group">
                <label for="average-spending">Average Monthly Spending</label>
                <input type="number" class="form-control" id="average-spending" name="average_spending" placeholder="Your typical spending" required>
            </div>
            <div class="form-group">
                <label for="debt">Outstanding Debts (if any)</label>
                <input type="number" class="form-control" id="debt" name="debt" placeholder="Enter any debts you have" required>
            </div>
            <div class="form-group">
                <label for="expense-categories">Monthly Expense Breakdown (Optional)</label>
                <textarea class="form-control" id="expense-categories" name="expense_categories" rows="4" placeholder="Breakdown of expenses (e.g., rent, groceries, transportation)"></textarea>
            </div>
            <div class="form-group">
                <label for="investments">Monthly Investment/Savings</label>
                <input type="number" class="form-control" id="investments" name="investments" placeholder="Enter your investments or savings goals" required>
            </div>
            <div class="form-group">
                <label for="savings-rate">Savings Rate (as a percentage)</label>
                <input type="number" class="form-control" id="savings-rate" name="savings_rate" placeholder="Enter your savings rate as a percentage" required>
            </div>
            <button type="submit" class="btn btn-success btn-block">Submit and Log In</button>
        </form>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Expense Tracker. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS, jQuery, and Popper.js -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.4.4/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
